<header class="site-header">
  <div class="nav-inner">
    <a class="nav-brand" href="{{ '/' | relative_url }}">Purgatoire</a>
    <span class="nav-divider"></span>
    <nav class="nav">
      <a href="{{ '/' | relative_url }}">Accueil</a>
      <span class="nav-pipe">|</span>
      <a href="{{ '/pages/archives/' | relative_url }}">Archives</a>
    </nav>

    <!-- ── Sélecteur de guilde ── -->
    <div class="guild-switcher" id="nav-guild-switcher">
      <button class="gs-btn" id="gs-btn-1" onclick="window.setActiveGuild('1')">G1</button>
      <button class="gs-btn" id="gs-btn-2" onclick="window.setActiveGuild('2')">G2</button>
    </div>
  </div>
</header>

<script>
(function() {
  function applyGuildUI() {
    const g = window.getActiveGuild ? window.getActiveGuild() : '1';
    const b1 = document.getElementById('gs-btn-1');
    const b2 = document.getElementById('gs-btn-2');
    if (!b1 || !b2) return;
    b1.classList.toggle('gs-active', g === '1');
    b2.classList.toggle('gs-active', g === '2');
  }
  // Attendre que config.js soit chargé
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyGuildUI);
  } else {
    applyGuildUI();
  }
})();
</script>

<style>

  position: sticky; top: 0; z-index: 100;
  height: 52px;

  border-bottom: 1px solid rgba(255,255,255,.08);
}
.nav-inner {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px 0 32px;
  gap: 0;
}
.nav-brand {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: .06em;
  color: #e3b45a;
  white-space: nowrap;
  padding-right: 24px;
  flex-shrink: 0;
  text-decoration: none;
}
.nav-divider {
  display: inline-block;
  width: 1px;
  height: 18px;
  background: rgba(255,255,255,.28);
  margin-right: 24px;
  flex-shrink: 0;
}
.nav {
  display: flex;
  align-items: center;
  gap: 0;
  flex: 1;
  min-width: 0;
  overflow-x: auto;
}
.nav a {
  font-size: .78rem;
  font-weight: 500;
  letter-spacing: .04em;
  color: rgba(233,228,217,.5);
  padding: 4px 16px;
  white-space: nowrap;
  transition: color .18s;
  text-decoration: none;
}
.nav a:hover  { color: #e8e4d9; }
.nav a.active { color: #e3b45a; }
.nav-pipe {
  color: rgba(255,255,255,.28);
  font-size: .75rem;
  line-height: 1;
  flex-shrink: 0;
  user-select: none;
}

/* ── Guild switcher ── */
.guild-switcher {
  display: flex;
  gap: 4px;
  margin-left: 20px;
  flex-shrink: 0;
}
.gs-btn {
  padding: 3px 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,.18);
  background: transparent;
  color: rgba(233,228,217,.45);
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .06em;
  cursor: pointer;
  transition: all .18s;
  font-family: var(--font-ui, sans-serif);
}
.gs-btn:hover { background: rgba(255,255,255,.08); color: #e8e4d9; }
.gs-btn.gs-active {
  background: rgba(227,180,90,.15);
  border-color: #e3b45a;
  color: #e3b45a;
}
</style>
