<style>
.site-header {
  position: sticky; top: 0; z-index: 100;
  height: 52px;
  background: rgba(7,8,13,.93);
  backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.nav-inner {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 32px;
  gap: 0;
}
.nav-brand {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: .06em;
  color: #e3b45a;
  white-space: nowrap;
  padding-right: 24px;
  flex-shrink: 0;
  text-decoration: none;
}
.nav-divider {
  display: inline-block;
  width: 1px;
  height: 18px;
  background: rgba(255,255,255,.28);
  margin-right: 24px;
  flex-shrink: 0;
}
.nav {
  display: flex;
  align-items: center;
  gap: 0;
}
.nav a {
  font-size: .78rem;
  font-weight: 500;
  letter-spacing: .04em;
  color: rgba(233,228,217,.5);
  padding: 4px 16px;
  white-space: nowrap;
  transition: color .18s;
  text-decoration: none;
}
.nav a:hover  { color: #e8e4d9; }
.nav a.active { color: #e3b45a; }
.nav-pipe {
  color: rgba(255,255,255,.28);
  font-size: .75rem;
  line-height: 1;
  flex-shrink: 0;
  user-select: none;
}
</style>

<script>
(function() {
  function applyGuildNav() {
    const g = window.getActiveGuild ? window.getActiveGuild() : '1';
    const b1 = document.getElementById('gs-btn-1');
    const b2 = document.getElementById('gs-btn-2');
    if (b1) b1.classList.toggle('gs-active', g === '1');
    if (b2) b2.classList.toggle('gs-active', g === '2');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', applyGuildNav);
  else applyGuildNav();
})();
</script>

<style>
.guild-switcher { display:flex;gap:4px;margin-left:20px;flex-shrink:0; }
.gs-btn { padding:3px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.18);background:transparent;color:rgba(233,228,217,.45);font-size:.72rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .18s;font-family:var(--font-ui,sans-serif); }
.gs-btn:hover { background:rgba(255,255,255,.08);color:#e8e4d9; }
.gs-btn.gs-active { background:rgba(227,180,90,.15);border-color:#e3b45a;color:#e3b45a; }
</style>
