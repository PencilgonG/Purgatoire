---
layout: default
title: Base de données
permalink: /pages/wiki/
---

<section class="page-hero compact">
  <div class="container">
    <span class="eyebrow">Données · Zeroluck.gg</span>
    <h1>Base de données</h1>
    <p>Personnages, armes, équipements, costumes — mis à jour automatiquement chaque lundi.</p>
  </div>
</section>

<section class="section-tight">
  <div class="container">

    <!-- Barre de recherche + stats -->
    <div class="wiki-topbar">
      <input id="wiki-search" type="search" placeholder="🔍  Rechercher un nom…" autocomplete="off">
      <div id="wiki-meta" class="wiki-meta-counts"></div>
    </div>

    <!-- Tabs -->
    <div class="wiki-tabs" id="wiki-tabs">
      <button class="wiki-tab active" data-tab="characters">Personnages</button>
      <button class="wiki-tab" data-tab="weapons">Armes</button>
      <button class="wiki-tab" data-tab="gear">Équipements</button>
      <button class="wiki-tab" data-tab="costumes">Costumes</button>
      <button class="wiki-tab" data-tab="sets">Sets</button>
      <button class="wiki-tab" data-tab="food" id="tab-food" style="display:none">Nourriture</button>
      <button class="wiki-tab" data-tab="items" id="tab-items" style="display:none">Items</button>
    </div>

    <!-- Filtres dynamiques -->
    <div id="wiki-filters" class="wiki-filters"></div>

    <!-- Contenu -->
    <div id="wiki-content">
      <div class="loading-state">Chargement de la base de données…</div>
    </div>

  </div>
</section>

<!-- Modal détail -->
<div id="wiki-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box" style="max-width:560px">
    <button class="modal-close" onclick="document.getElementById('wiki-modal').style.display='none'">✕</button>
    <div id="wiki-modal-content"></div>
  </div>
</div>

<style>
/* ── Topbar ── */
.wiki-topbar { display:flex; gap:16px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
#wiki-search {
  flex:1; min-width:220px; background:var(--bg-elevated); border:1px solid var(--border);
  border-radius:var(--radius); padding:9px 14px; color:var(--text-primary);
  font-family:var(--font-ui); font-size:.875rem;
  transition:border-color .18s;
}
#wiki-search:focus { outline:none; border-color:var(--border-gold); }
.wiki-meta-counts { font-size:.72rem; color:var(--text-muted); white-space:nowrap; }
.wiki-meta-counts span { color:var(--gold-bright); font-weight:600; }

/* ── Tabs ── */
.wiki-tabs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:16px; border-bottom:1px solid var(--border); padding-bottom:0; }
.wiki-tab {
  padding:8px 18px; border:none; background:transparent; cursor:pointer;
  font-family:var(--font-ui); font-size:.8rem; font-weight:600; letter-spacing:.04em;
  color:var(--text-secondary); border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:color .18s, border-color .18s;
}
.wiki-tab:hover { color:var(--text-primary); }
.wiki-tab.active { color:var(--gold-bright); border-bottom-color:var(--gold-bright); }

/* ── Filtres ── */
.wiki-filters { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; min-height:28px; }
.wiki-filter-chip {
  padding:3px 12px; border-radius:99px; border:1px solid var(--border);
  background:transparent; cursor:pointer; font-family:var(--font-ui);
  font-size:.72rem; font-weight:600; color:var(--text-secondary);
  transition:all .15s; white-space:nowrap;
}
.wiki-filter-chip:hover { border-color:rgba(201,151,62,.4); color:var(--text-primary); }
.wiki-filter-chip.active { background:var(--gold-dim); border-color:var(--border-gold); color:var(--gold-bright); }

/* ── Grille cards ── */
.wiki-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
  gap:10px;
}
.wiki-grid.wide { grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); }

.wiki-card {
  background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; cursor:pointer;
  transition:border-color .18s, transform .18s, box-shadow .18s;
}
.wiki-card:hover { border-color:rgba(201,151,62,.4); transform:translateY(-2px); box-shadow:var(--shadow); }

.wiki-card-img {
  width:100%; aspect-ratio:1; object-fit:cover; object-position:top;
  background:var(--bg-elevated); display:block;
}
.wiki-card-img.weapon { aspect-ratio:1; object-position:center; }
.wiki-card-img.gear   { aspect-ratio:1; object-position:center; }

.wiki-card-body { padding:8px 10px; }
.wiki-card-name { font-size:.78rem; font-weight:600; color:var(--text-primary); line-height:1.3;
                  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wiki-card-sub  { font-size:.65rem; color:var(--text-muted); margin-top:2px; }

.wiki-card-badges { display:flex; gap:4px; flex-wrap:wrap; margin-top:5px; }
.badge-elem {
  display:inline-flex; align-items:center; gap:3px;
  font-size:.6rem; font-weight:700; letter-spacing:.04em;
  padding:1px 6px; border-radius:99px;
}
.badge-ssr { background:rgba(201,151,62,.18); color:#e3b45a; border:1px solid rgba(201,151,62,.3); }
.badge-sr  { background:rgba(180,100,220,.18); color:#c882e8; border:1px solid rgba(180,100,220,.3); }
.badge-r   { background:rgba(80,130,220,.18);  color:#7aa8e8; border:1px solid rgba(80,130,220,.3); }

/* ── Sets ── */
.set-card {
  background:var(--bg-surface); border:1px solid var(--border-gold);
  border-radius:var(--radius-lg); padding:18px; cursor:pointer;
  background:linear-gradient(145deg,rgba(201,151,62,.04),var(--bg-surface));
  transition:border-color .18s, transform .18s;
}
.set-card:hover { border-color:rgba(201,151,62,.5); transform:translateY(-2px); }
.set-card-name { font-family:var(--font-display); font-size:1.1rem; color:#f0ece0; margin-bottom:8px; }
.set-pieces { display:flex; gap:6px; flex-wrap:wrap; }
.set-piece-img { width:40px; height:40px; border-radius:var(--radius-sm); object-fit:cover;
                 background:var(--bg-elevated); border:1px solid var(--border); }
.set-bonus { font-size:.72rem; color:var(--text-secondary); margin-top:8px; padding:6px 10px;
             background:rgba(255,255,255,.03); border-radius:var(--radius-sm); }
.set-bonus strong { color:var(--gold-bright); }

/* ── Détail modal ── */
.wiki-detail-header { display:flex; gap:14px; align-items:flex-start; margin-bottom:18px; }
.wiki-detail-img { width:80px; height:80px; border-radius:var(--radius); object-fit:cover;
                   object-position:top; border:1px solid var(--border-gold); flex-shrink:0;
                   background:var(--bg-elevated); }
.wiki-detail-title { font-family:var(--font-display); font-size:1.6rem; font-weight:700; color:#f0ece0; }
.wiki-detail-sub   { font-size:.8rem; color:var(--text-secondary); margin-top:4px; }
.wiki-stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.wiki-stat-box { background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-sm);
                 padding:8px 12px; }
.wiki-stat-label { font-size:.65rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
                   color:var(--text-muted); margin-bottom:3px; }
.wiki-stat-value { font-size:.95rem; font-weight:700; color:var(--gold-bright); }
.wiki-skills { margin-top:14px; }
.wiki-skill { display:flex; gap:10px; align-items:flex-start; padding:8px 0;
              border-bottom:1px solid var(--border); }
.wiki-skill:last-child { border-bottom:none; }
.wiki-skill-img { width:36px; height:36px; border-radius:var(--radius-sm); flex-shrink:0;
                  background:var(--bg-elevated); border:1px solid var(--border); object-fit:cover; }
.wiki-skill-name { font-size:.8rem; font-weight:700; color:var(--text-primary); }
.wiki-skill-desc { font-size:.72rem; color:var(--text-secondary); margin-top:2px; line-height:1.5; }
.wiki-echelon-bars { margin-top:10px; }
.wiki-echelon-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; font-size:.72rem; }
.wiki-echelon-label { color:var(--text-muted); min-width:22px; }
.wiki-echelon-bar { flex:1; height:6px; background:var(--border); border-radius:99px; overflow:hidden; }
.wiki-echelon-fill { height:100%; background:var(--gold-bright); border-radius:99px; }
.wiki-echelon-val { color:var(--gold-bright); font-weight:600; min-width:40px; text-align:right; }

/* ── Empty / loading ── */
.wiki-empty { text-align:center; padding:48px 20px; color:var(--text-muted);
              border:1px dashed var(--border); border-radius:var(--radius-lg); }
</style>

<script>
(function() {
  const WORKER = 'https://purgatoire-bot.originsguild.workers.dev';
  const DATA_URL = '{{ "/assets/data/game_data.json" | relative_url }}';

  // Proxy image zeroluck via le Worker CF
  function imgUrl(raw) {
    if (!raw) return '';
    if (raw.includes('cdn-zeroluck-gg')) return `${WORKER}/img?url=${encodeURIComponent(raw)}`;
    return raw;
  }
  // Portrait local si dispo, sinon proxy
  function charImg(c, type) {
    if (typeof heroPortrait === 'function') {
      const local = heroPortrait(c.nom, type || 'slot');
      if (local) return local;
    }
    return imgUrl(type === 'slot' ? c.image_slot : (type === 'big' ? c.image_url : c.image_equip));
  }

  const ELEM_COLORS = {
    'Fire':'#e87050','Ice':'#70b8e8','Wind':'#78d080','Dark':'#b870e0',
    'Earth':'#b89040','Holy':'#e8d870','Thunder':'#8090e8','Default':'#888'
  };
  const ELEM_ICON = {
    'Fire':'🔥','Ice':'❄','Wind':'🌀','Dark':'🌑','Earth':'🌱','Holy':'✨','Thunder':'⚡','Default':'◎'
  };
  const TYPE_LABEL = {
    'Sword1h':'Épée 1M','Sword2h':'Épée 2M','SwordDual':'Doubles épées',
    'Lance':'Lance','Shield':'Bouclier','Axe':'Hache','Gauntlets':'Gantelets',
    'Cudgel3c':'Gourdin','Rapier':'Rapière','Book':'Livre','Wand':'Bâton','END_WEAPON':'Arme spéciale'
  };
  const SLOT_LABEL = {
    'Top':'Haut','Bottom':'Bas','Belt':'Ceinture','Shoes':'Chaussures',
    'Earring':'Boucles d\'oreilles','Necklace':'Collier','Ring':'Bague'
  };

  let DATA = null;
  let currentTab = 'characters';
  let currentFilter = 'all';
  let searchQuery = '';

  // ── INIT ──
  async function init() {
    try {
      const r = await fetch(DATA_URL);
      DATA = await r.json();
      // Afficher les stats meta
      const m = DATA.meta?.counts || {};
      document.getElementById('wiki-meta').innerHTML =
        `<span>${m.characters||0}</span> persos · <span>${m.weapons||0}</span> armes · ` +
        `<span>${m.gear||0}</span> équips · <span>${m.costumes||0}</span> costumes · ` +
        `<span>${m.sets||0}</span> sets` +
        (m.food ? ` · <span>${m.food}</span> recettes` : '') +
        `<br><small style="opacity:.5">Mis à jour: ${(DATA.meta?.generated_at||'').slice(0,10)}</small>`;
      // Afficher tabs food/items si dispo
      if (m.food  > 0) document.getElementById('tab-food')?.style.setProperty('display','');
      if (m.items > 0) document.getElementById('tab-items')?.style.setProperty('display','');
      render();
    } catch(e) {
      document.getElementById('wiki-content').innerHTML =
        '<div class="wiki-empty">Impossible de charger la base de données.</div>';
    }
  }

  // ── RENDER ──
  function render() {
    if (!DATA) return;
    renderFilters();
    renderContent();
  }

  function renderFilters() {
    const fc = document.getElementById('wiki-filters');
    let chips = [];

    if (currentTab === 'characters') {
      // Filtres par élément
      const elems = [...new Set(DATA.characters.flatMap(c => c.element_list||[]).filter(Boolean))].sort();
      chips = [['all','Tous'],...elems.map(e => [e, `${ELEM_ICON[e]||''} ${e}`])];
    } else if (currentTab === 'weapons') {
      const types = Object.keys(DATA.weapons_by_type||{}).sort();
      chips = [['all','Tous'],...types.map(t => [t, TYPE_LABEL[t]||t])];
    } else if (currentTab === 'gear') {
      const slots = Object.keys(DATA.gear_by_slot||{}).sort();
      chips = [['all','Tous'],...slots.map(s => [s, SLOT_LABEL[s]||s])];
      // Ajout filtre rareté
    } else if (currentTab === 'costumes') {
      chips = [['all','Tous'],['SSR','⭐ SSR'],['SR','SR'],['R','R']];
    }

    if (!chips.length) { fc.innerHTML = ''; return; }
    fc.innerHTML = chips.map(([val, label]) =>
      `<button class="wiki-filter-chip${currentFilter===val?' active':''}" onclick="setFilter('${val}')">${label}</button>`
    ).join('');
  }

  function renderContent() {
    const wrap = document.getElementById('wiki-content');
    const q = searchQuery.toLowerCase().trim();

    if      (currentTab === 'characters') renderCharacters(wrap, q);
    else if (currentTab === 'weapons')    renderWeapons(wrap, q);
    else if (currentTab === 'gear')       renderGear(wrap, q);
    else if (currentTab === 'costumes')   renderCostumes(wrap, q);
    else if (currentTab === 'sets')       renderSets(wrap, q);
    else if (currentTab === 'food')       renderFood(wrap, q);
    else if (currentTab === 'items')      renderItems(wrap, q);
  }

  function renderCharacters(wrap, q) {
    let chars = DATA.characters || [];
    if (currentFilter !== 'all')
      chars = chars.filter(c => (c.element_list||[]).includes(currentFilter));
    if (q) chars = chars.filter(c => c.nom.toLowerCase().includes(q) || c.armes.toLowerCase().includes(q));

    if (!chars.length) { wrap.innerHTML = '<div class="wiki-empty">Aucun personnage trouvé.</div>'; return; }

    wrap.innerHTML = `<div class="wiki-grid">${chars.map(c => {
      const elem = (c.element_list||[])[0] || 'Default';
      const col  = ELEM_COLORS[elem] || '#888';
      const localImg = charImg(c, 'slot');
      return `<div class="wiki-card" onclick="showCharDetail(${JSON.stringify(JSON.stringify(c)).slice(1,-1)})">
        <div style="position:relative;height:120px;overflow:hidden;background:rgba(0,0,0,.2)">
          <img src="${localImg}" class="wiki-card-img" style="height:120px" onerror="this.parentElement.style.background='var(--bg-elevated)'">
          <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(7,8,13,.9) 100%)"></div>
          <span style="position:absolute;bottom:5px;right:7px;font-size:.6rem;font-weight:700;color:${col}">${ELEM_ICON[elem]||''} ${elem}</span>
        </div>
        <div class="wiki-card-body">
          <div class="wiki-card-name">${c.nom}</div>
          <div class="wiki-card-sub">${(c.weapon_types||[]).map(t=>TYPE_LABEL[t]||t).join(' · ')}</div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function renderWeapons(wrap, q) {
    let all = [];
    if (currentFilter === 'all') {
      Object.entries(DATA.weapons_by_type||{}).forEach(([t,ws]) => ws.forEach(w => all.push({...w,_type:t})));
    } else {
      all = (DATA.weapons_by_type?.[currentFilter]||[]).map(w => ({...w,_type:currentFilter}));
    }
    all.sort((a,b) => (a.rarete||'').localeCompare(b.rarete||''));
    if (q) all = all.filter(w => w.nom.toLowerCase().includes(q) || (w.passive_name||'').toLowerCase().includes(q));
    if (!all.length) { wrap.innerHTML = '<div class="wiki-empty">Aucune arme trouvée.</div>'; return; }

    wrap.innerHTML = `<div class="wiki-grid wide">${all.map(w => {
      const rLabel = w.rarete_label || w.rarete || '';
      const badgeCls = rLabel==='SSR'?'badge-ssr':rLabel==='SR'?'badge-sr':'badge-r';
      return `<div class="wiki-card" onclick="showWeaponDetail(${JSON.stringify(JSON.stringify(w)).slice(1,-1)})">
        <div style="padding:12px;text-align:center;background:var(--bg-elevated);height:90px;display:flex;align-items:center;justify-content:center">
          <img src="${imgUrl(w.image_url)}" class="wiki-card-img weapon" style="width:72px;height:72px;object-fit:contain" onerror="this.style.opacity='.3'">
        </div>
        <div class="wiki-card-body">
          <div class="wiki-card-name">${w.nom}</div>
          <div class="wiki-card-sub">${TYPE_LABEL[w._type]||w._type}</div>
          <div class="wiki-card-badges">
            <span class="badge-elem ${badgeCls}">${rLabel}</span>
            <span style="font-size:.65rem;color:var(--gold-bright)">ATK ${w.atk_base||'—'}</span>
          </div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function renderGear(wrap, q) {
    let all = [];
    if (currentFilter === 'all') {
      Object.entries(DATA.gear_by_slot||{}).forEach(([s,gs]) => gs.forEach(g => all.push({...g,_slot:s})));
    } else {
      all = (DATA.gear_by_slot?.[currentFilter]||[]).map(g => ({...g,_slot:currentFilter}));
    }
    if (q) all = all.filter(g => g.nom.toLowerCase().includes(q) || (g.set_name||'').toLowerCase().includes(q));
    if (!all.length) { wrap.innerHTML = '<div class="wiki-empty">Aucun équipement trouvé.</div>'; return; }

    wrap.innerHTML = `<div class="wiki-grid wide">${all.map(g => {
      const rLabel = g.rarete_label || g.rarete || '';
      const badgeCls = rLabel==='SSR'?'badge-ssr':rLabel==='SR'?'badge-sr':'badge-r';
      return `<div class="wiki-card" onclick="showGearDetail(${JSON.stringify(JSON.stringify(g)).slice(1,-1)})">
        <div style="padding:10px;text-align:center;background:var(--bg-elevated);height:80px;display:flex;align-items:center;justify-content:center">
          <img src="${imgUrl(g.image_url)}" style="width:60px;height:60px;object-fit:contain" onerror="this.style.opacity='.3'">
        </div>
        <div class="wiki-card-body">
          <div class="wiki-card-name">${g.nom}</div>
          <div class="wiki-card-sub">${SLOT_LABEL[g._slot]||g._slot}${g.set_name ? ' · '+g.set_name.slice(0,20) : ''}</div>
          <div class="wiki-card-badges">
            <span class="badge-elem ${badgeCls}">${rLabel}</span>
            ${g.main_stat ? `<span style="font-size:.62rem;color:var(--text-muted)">${g.main_stat}</span>` : ''}
          </div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function renderCostumes(wrap, q) {
    let all = DATA.costumes || [];
    if (currentFilter !== 'all') all = all.filter(c => (c.rarete_label||c.rarete) === currentFilter);
    if (q) all = all.filter(c => c.nom.toLowerCase().includes(q));
    if (!all.length) { wrap.innerHTML = '<div class="wiki-empty">Aucun costume trouvé.</div>'; return; }

    wrap.innerHTML = `<div class="wiki-grid">${all.map(c => `
      <div class="wiki-card">
        <div style="padding:10px;text-align:center;background:var(--bg-elevated);height:100px;display:flex;align-items:center;justify-content:center">
          <img src="${imgUrl(c.image_url)}" style="width:80px;height:80px;object-fit:cover" onerror="this.style.opacity='.3'">
        </div>
        <div class="wiki-card-body">
          <div class="wiki-card-name">${c.nom}</div>
          <div class="wiki-card-badges">
            <span class="badge-elem ${(c.rarete_label||c.rarete)==='SSR'?'badge-ssr':'badge-sr'}">${c.rarete_label||c.rarete||'—'}</span>
          </div>
        </div>
      </div>`).join('')}</div>`;
  }

  function renderSets(wrap, q) {
    let sets = Object.values(DATA.sets || {});
    if (q) sets = sets.filter(s => s.nom.toLowerCase().includes(q));
    sets.sort((a,b) => b.pieces.length - a.pieces.length);
    if (!sets.length) { wrap.innerHTML = '<div class="wiki-empty">Aucun set trouvé.</div>'; return; }

    wrap.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
      ${sets.map(s => `
      <div class="set-card">
        <div class="set-card-name">${s.nom}</div>
        <div style="font-size:.65rem;color:var(--text-muted);margin-bottom:10px">${s.pieces.length} pièces</div>
        <div class="set-pieces">
          ${s.pieces.map(p => `<img src="${imgUrl(p.image_url)}" class="set-piece-img" title="${p.nom}" onerror="this.style.opacity='.2'">`).join('')}
        </div>
        ${(s.bonuses||[]).map(b => `
          <div class="set-bonus"><strong>${b.pieces} pièces :</strong> ${b.desc||'—'}</div>
        `).join('')}
      </div>`).join('')}
    </div>`;
  }

  function renderFood(wrap, q) {
    let all = DATA.food || [];
    if (q) all = all.filter(f => f.nom.toLowerCase().includes(q));
    if (!all.length) { wrap.innerHTML = '<div class="wiki-empty">Aucune recette disponible (sera ajoutée au prochain run du scraper).</div>'; return; }
    wrap.innerHTML = `<div class="wiki-grid wide">${all.map(f => `
      <div class="wiki-card">
        <div style="padding:10px;text-align:center;background:var(--bg-elevated);height:80px;display:flex;align-items:center;justify-content:center">
          <img src="${imgUrl(f.image_url)}" style="width:64px;height:64px;object-fit:contain" onerror="this.style.opacity='.3'">
        </div>
        <div class="wiki-card-body">
          <div class="wiki-card-name">${f.nom}</div>
          <div class="wiki-card-sub">${f.categorie||'—'}</div>
          ${(f.buffs||[]).length ? `<div style="font-size:.65rem;color:var(--green);margin-top:4px">${f.buffs.map(b=>`+${b.val}${b.unit} ${b.stat}`).join(' · ')}</div>` : ''}
        </div>
      </div>`).join('')}</div>`;
  }

  function renderItems(wrap, q) {
    let all = DATA.items || [];
    if (q) all = all.filter(i => i.nom.toLowerCase().includes(q));
    if (!all.length) { wrap.innerHTML = '<div class="wiki-empty">Aucun item disponible (sera ajouté au prochain run du scraper).</div>'; return; }
    wrap.innerHTML = `<div class="wiki-grid">${all.map(i => `
      <div class="wiki-card">
        <div style="padding:10px;text-align:center;background:var(--bg-elevated);height:70px;display:flex;align-items:center;justify-content:center">
          <img src="${imgUrl(i.image_url)}" style="width:50px;height:50px;object-fit:contain" onerror="this.style.opacity='.3'">
        </div>
        <div class="wiki-card-body">
          <div class="wiki-card-name">${i.nom}</div>
          <div class="wiki-card-sub">${i.categorie||'—'}</div>
        </div>
      </div>`).join('')}</div>`;
  }

  // ── DÉTAILS MODALS ──
  window.showCharDetail = function(raw) {
    const c = JSON.parse(raw);
    const modal = document.getElementById('wiki-modal');
    const content = document.getElementById('wiki-modal-content');
    const elem0 = (c.element_list||[])[0] || 'Default';
    const col = ELEM_COLORS[elem0]||'#888';

    let skillsHtml = '';
    if ((c.skills||[]).length) {
      skillsHtml = `<div class="wiki-skills">
        <div class="modal-stat-label" style="margin-bottom:10px">Compétences</div>
        ${c.skills.map(sk => `<div class="wiki-skill">
          ${sk.image_url ? `<img src="${imgUrl(sk.image_url)}" class="wiki-skill-img" onerror="this.style.opacity='.2'">` : ''}
          <div><div class="wiki-skill-name">${sk.nom||'—'} <span style="font-size:.6rem;color:var(--text-muted)">${sk.type||''}</span></div>
          ${sk.desc ? `<div class="wiki-skill-desc">${sk.desc}</div>` : ''}</div>
        </div>`).join('')}
      </div>`;
    }

    let costumesHtml = '';
    if ((c.skin_costumes||[]).length) {
      costumesHtml = `<div style="margin-top:14px">
        <div class="modal-stat-label" style="margin-bottom:8px">Costumes (${c.skin_costumes.length})</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${c.skin_costumes.map(cs => `<div style="text-align:center">
            <img src="${imgUrl(cs.image_url)}" style="width:52px;height:52px;border-radius:6px;object-fit:cover;background:var(--bg-elevated);border:1px solid var(--border)" onerror="this.style.opacity='.2'">
            <div style="font-size:.58rem;color:var(--text-muted);margin-top:3px;max-width:52px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cs.nom}</div>
          </div>`).join('')}
        </div>
      </div>`;
    }

    content.innerHTML = `
      <div class="wiki-detail-header">
        <img src="${charImg(c,'slot')}" class="wiki-detail-img" onerror="this.style.opacity='.3'">
        <div>
          <div class="wiki-detail-title">${c.nom}</div>
          <div class="wiki-detail-sub" style="color:${col}">${(c.element_list||[]).filter(Boolean).join(' · ')}</div>
          <div class="wiki-detail-sub">${(c.weapon_types||[]).map(t=>TYPE_LABEL[t]||t).join(' · ')}</div>
        </div>
      </div>
      ${skillsHtml}
      ${costumesHtml}
    `;
    modal.style.display = 'flex';
  };

  window.showWeaponDetail = function(raw) {
    const w = JSON.parse(raw);
    const modal = document.getElementById('wiki-modal');
    const content = document.getElementById('wiki-modal-content');
    const maxAtk = Math.max(...Object.values(w.atk_by_echelon||{}), 1);

    content.innerHTML = `
      <div class="wiki-detail-header">
        <div style="width:80px;height:80px;background:var(--bg-elevated);border:1px solid var(--border-gold);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <img src="${imgUrl(w.image_url)}" style="width:64px;height:64px;object-fit:contain" onerror="this.style.opacity='.3'">
        </div>
        <div>
          <div class="wiki-detail-title">${w.nom}</div>
          <div class="wiki-detail-sub">${TYPE_LABEL[w._type||w.type]||w._type||w.type||'—'} · ${w.rarete_label||w.rarete||'—'}</div>
          ${w.passive_name ? `<div class="wiki-detail-sub" style="color:var(--gold-bright)">${w.passive_name}</div>` : ''}
        </div>
      </div>
      ${w.passive_desc ? `<div style="font-size:.78rem;color:var(--text-secondary);margin-bottom:14px;padding:8px 12px;background:var(--bg-elevated);border-radius:var(--radius-sm)">${w.passive_desc}</div>` : ''}
      <div class="wiki-echelon-bars">
        <div class="modal-stat-label" style="margin-bottom:8px">ATK par échelon</div>
        ${Object.entries(w.atk_by_echelon||{}).map(([e,v]) => `
        <div class="wiki-echelon-row">
          <span class="wiki-echelon-label">E${e}</span>
          <div class="wiki-echelon-bar"><div class="wiki-echelon-fill" style="width:${Math.round(v/maxAtk*100)}%"></div></div>
          <span class="wiki-echelon-val">${v}</span>
        </div>`).join('')}
      </div>
      ${(w.sub_stats||[]).length ? `
      <div style="margin-top:12px">
        <div class="modal-stat-label" style="margin-bottom:6px">Substats</div>
        ${w.sub_stats.map(s=>`<div style="font-size:.78rem;color:var(--text-secondary)">${s.stat}: <span style="color:var(--gold-bright)">${s.val}</span></div>`).join('')}
      </div>` : ''}
    `;
    modal.style.display = 'flex';
  };

  window.showGearDetail = function(raw) {
    const g = JSON.parse(raw);
    const modal = document.getElementById('wiki-modal');
    const content = document.getElementById('wiki-modal-content');

    content.innerHTML = `
      <div class="wiki-detail-header">
        <div style="width:80px;height:80px;background:var(--bg-elevated);border:1px solid var(--border-gold);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <img src="${imgUrl(g.image_url)}" style="width:64px;height:64px;object-fit:contain" onerror="this.style.opacity='.3'">
        </div>
        <div>
          <div class="wiki-detail-title">${g.nom}</div>
          <div class="wiki-detail-sub">${SLOT_LABEL[g._slot||g.slot]||g._slot||g.slot||'—'} · ${g.rarete_label||g.rarete||'—'}</div>
          ${g.set_name ? `<div class="wiki-detail-sub" style="color:var(--gold-bright)">Set: ${g.set_name}</div>` : ''}
        </div>
      </div>
      <div class="wiki-stat-grid">
        ${g.main_stat ? `<div class="wiki-stat-box"><div class="wiki-stat-label">Stat principale</div><div class="wiki-stat-value">${g.main_stat} ${g.main_val||''}</div></div>` : ''}
        ${(g.sub_stats||[]).map(s=>`<div class="wiki-stat-box"><div class="wiki-stat-label">${s.stat}</div><div class="wiki-stat-value">${s.val}</div></div>`).join('')}
        ${(g.rand_opts||[]).map(s=>`<div class="wiki-stat-box"><div class="wiki-stat-label">${s.stat} <span style="opacity:.5">(aléatoire)</span></div><div class="wiki-stat-value">${s.min}–${s.max}</div></div>`).join('')}
      </div>
      ${(g.set_bonuses||[]).length ? `
      <div>
        <div class="modal-stat-label" style="margin-bottom:6px">Bonus de set</div>
        ${g.set_bonuses.map(b=>`<div class="set-bonus"><strong>${b.pieces} pièces :</strong> ${b.desc||'—'}</div>`).join('')}
      </div>` : ''}
    `;
    modal.style.display = 'flex';
  };

  // ── EVENTS ──
  window.setFilter = function(val) {
    currentFilter = val;
    render();
  };

  document.querySelectorAll('.wiki-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.wiki-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      currentFilter = 'all';
      render();
    });
  });

  let searchTimer;
  document.getElementById('wiki-search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { searchQuery = e.target.value; renderContent(); }, 200);
  });

  init();
})();
</script>
